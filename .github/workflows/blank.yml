# .github/workflows/dau_alert.yml
name: DAU Alert
on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6AM UTC (11:30AM IST)
  workflow_dispatch:        # also lets you trigger it manually from GitHub UI
jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-analytics-data google-auth google-auth-oauthlib
          pip install pandas numpy scipy statsmodels nbconvert nest-asyncio

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.TOKEN_DATA }}' > token.json
          echo '${{ secrets.CLIENT_SECRET_LOVE }}' > client_secret_luvkey.json
          echo '${{ secrets.EMAIL_CREDENTIAL_JSON }}' > email_credential.json

      - name: Convert notebook to python
        run: jupyter nbconvert --to script conncection_check.ipynb

      - name: Run DAU alert script
        run: python conncection_check.py

      - name: Commit log file back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dau_log.json
          git diff --staged --quiet || git commit -m "DAU log update $(date +'%Y-%m-%d')"
          git push
